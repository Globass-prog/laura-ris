<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte à rebours LAURA COUPLE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #111;
            color: #fff;
            padding-top: 100px;
        }

        #countdown {
            font-size: 50px;
            margin-top: 20px;
        }

        h1 {
            font-size: 40px;
        }
    </style>
</head>
<body>

    <h1>Compte à rebours LAURA COUPLE</h1>
    <div id="countdown"></div>

    <script>
        // Date cible (modifie ici)
        const targetDate = new Date("2026-04-18 23:59:59").getTime();

        const countdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
                days + "j " + hours + "h "
                + minutes + "m " + seconds + "s ";

            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("countdown").innerHTML = "Temps écoulé !";
            }
        }, 1000);
    </script>

</body>
</html>
